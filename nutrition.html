<!doctype html>
<html lang="en=GB">
<head>
    <meta charset="UTF-8">
    <title>FitForge - NUTRITION</title>
    <meta name="description" content="FitForge is a fitness platform that helps you achieve your health and wellness goals through personalized workout plans, nutrition guidance, and community support.">
    <meta name="keywords" content="fitness, fitness app, workout plans, nutrition guidance, health, wellness, FitForge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- Google Font-->
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
   <!-- Bootstrap CSS-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Custom CSS-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
     <!--Header-->
    <header>
        <nav id ="menu">
            <img src="assets/images/fitforge.png" alt="FitForge Logo" id="logo" width="200px">
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="workouts.html">WORKOUTS</a></li>
                <li><a href="nutrition.html">NUTRITION</a></li>
            </ul>
        </nav>
         
        <!-- Nutrition Calculator -->
    <section class="calculator container py-5">

        <h1 class="text-center mb-4">Macronutrient Calculator</h1>

        <div class="row justify-content-center">
            <div class="col-md-6">

                <label for="calories" class="form-label">Enter Your Daily Calories</label>
                <input type="number" id="calories" class="form-control mb-3">

                <label for="goal" class="form-label">Your Fitness Goal</label>
                <select id="goal" class="form-select mb-3">
                    <option value="">Select Goal</option>
                    <option value="loss">Weight Loss</option>
                    <option value="maintain">Maintain Weight</option>
                    <option value="gain">Muscle Gain</option>
                </select>

                <button id="calculate-btn" class="btn btn-dark w-100">
                    Calculate
                </button>

                <div id="results" class="mt-4"></div>

            </div>
        </div>

    </section>

    </header>
</body>
</html>
